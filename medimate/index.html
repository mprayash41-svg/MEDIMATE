<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEDIMATE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A90E2">
</head>

<body>

<div class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
        <h1 data-lang="title">💙 MEDIMATE</h1>
        <div id="pointDisplay" style="font-size: 1.2rem; color: gold; font-weight: bold;">🌟 0</div>
    </div>

    <button onclick="openAdd()" data-lang="add">➕ Add Medicine</button>
    <button onclick="openHistory()" data-lang="history">📊 History</button>
    <button onclick="openDoctor()" data-lang="doctor">🩺 Doctor</button>
    <button onclick="openContacts()" data-lang="contacts">📞 Contacts</button>
    
    <button onclick="openVibration()" style="background: linear-gradient(45deg, #ff416c, #ff4b2b); border: 2px solid white; font-weight: bold;">
        🚨 IMPORTANT (Crisis Mode)
    </button>

    <button onclick="openSettings()" data-lang="settings">⚙️ Settings</button>
    <button onclick="logout()" data-lang="logout">🚪 Logout</button>

    <div class="glass">
        <h2 style="color: white; margin-bottom: 15px;">📋 Medicines</h2>
        <div id="medicineListDisplay">
            <p style="text-align:center; color: #aaa;">Loading medicines...</p>
        </div>
    </div>

    <div class="glass">
        <h2 data-lang="scanTitle">📷 Prescription Scanner</h2>
        <input type="file" onchange="scanPrescription(event)">
        <p id="scanResult" data-lang="scanText">Upload prescription</p>
    </div>

    <div class="glass">
        <h2 style="color: #ff4d4d;">🚨 Emergency SOS</h2>
        <p style="font-size: 0.8rem; color: #ccc;">Alert your emergency contact via WhatsApp</p>
        
        <button onclick="openSOS()" style="background: red; color: white;">🚨 Send SOS Alert</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
