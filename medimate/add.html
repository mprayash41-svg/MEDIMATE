<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A90E2">
  <meta charset="UTF-8">
  <title>Add Medicine</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c3e50);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .back-btn {
      background: #ff6b6b;
    }
  </style>
</head>

<body onload="applyLanguage()">

  <div class="container">
    
    <!-- Default text added (IMPORTANT FIX) -->
    <h1 data-lang="add">➕ Add Medicine</h1>

    <div class="glass">
      
      <input id="medName" data-placeholder="medName" placeholder="Medicine Name">

      <input id="medDose" data-placeholder="dose" placeholder="Dose">

      <input type="time" id="medTime">

      <button onclick="addMedicine()" data-lang="add">Add</button>

      <!-- Voice button removed -->
      
      <button class="back-btn" onclick="goBack()">⬅ Back</button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
