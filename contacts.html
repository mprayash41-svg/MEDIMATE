<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
    <meta charset="UTF-8">
    <title>Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="applyLanguage()">

<div class="container">
    <h1 data-lang="emergencyTitle">📞 Emergency Contact</h1>

    <div class="glass">
        <input type="text" id="contactNameInput" placeholder="Name">
        <input type="tel" id="contactPhoneInput" placeholder="Phone Number">

        <button onclick="saveContact()" data-lang="save">Save</button>
        <button onclick="openSOS()" data-lang="sos" class="sos-btn">SOS</button>
    </div>

    <p id="savedContactDisplay"></p>

    <button onclick="goBack()" data-lang="back">⬅ Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
