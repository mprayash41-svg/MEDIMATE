<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A90E2">
  <title data-lang="settings">Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1 data-lang="settings">⚙️ Settings</h1>

  <!-- LANGUAGE -->
  <div class="glass">
    <h2 data-lang="language">🌍 Language</h2>

    <select id="languageSelect" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="bn">Bengali</option>
    </select>
  </div>

  <!-- DARK MODE -->
  <div class="glass">
    <h2 data-lang="theme">🌙 Theme</h2>
    <button onclick="toggleDark()" data-lang="darkBtn">
      Toggle Dark Mode
    </button>
  </div>

  <!-- BACK BUTTON -->
  <button onclick="goBack()" data-lang="back">⬅ Back</button>

</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  let savedLang = localStorage.getItem("lang") || "en";
  document.getElementById("languageSelect").value = savedLang;
  applyLanguage();
});
</script>

</body>
</html>
